{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>SoleVault - Sign Up</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'accounts/css/login.css' %}">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-custom px-5">
    <a class="navbar-brand" href="#">SoleVault</a>

    <div class="ms-4">
      <a class="nav-link d-inline" href="#">Home</a>
      <a class="nav-link d-inline" href="#">About</a>
    </div>
  </nav>

  <!-- Form -->
  <div class="form-container">

    <h4 class="mb-4"><strong>Login</strong></h4>


    <form method="POST">
      {% csrf_token %}
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" required>
      <label for="">Password</label>
      <div class="position-relative">
        <input type="password" name="password" class="form-control" required>
      </div>

      <p class="small-text ">
        <a href="{% url 'forget_password' %}" class="small-text ">Forgot password</a>
      </p>
      <p class="small-text">
        New User
        <a href="{% url 'signup' %}">Sign Up</a>
      </p>



      <button type="submit" class="btn btn-primary">Login</button>

      <div class="divider">Or Login with</div>

      <a href="{% url 'google_login' %}"
        class="btn btn-outline-dark w-100 d-flex align-items-center justify-content-center gap-2">
        <img src="https://img.icons8.com/color/16/google-logo.png">
        Google
      </a>


    </form>
    <br>
    {% if messages %}
    {% for message in messages %}
    <div class="alert 
        {% if message.tags == 'error' %}alert-danger
        {% elif message.tags == 'success' %}alert-success
        {% elif message.tags == 'warning' %}alert-warning
        {% else %}alert-info
        {% endif %}">

      {{ message }}
    </div>
    {% endfor %}
    {% endif %}
  </div>

  <script>
    setTimeout(() => {
      document.querySelectorAll('.alert').forEach(el => el.remove());
    }, 3000);
  </script>
</body>

</html>
