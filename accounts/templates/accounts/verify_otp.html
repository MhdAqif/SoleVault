{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>SoleVault - OTP Verify</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- OTP page styles -->
  <link rel="stylesheet" href="{% static 'accounts/css/verify_otp.css' %}">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-custom px-5">
    <a class="navbar-brand" href="#">SoleVault</a>
    <div class="ms-4">
      <a class="nav-link d-inline" href="#">Home</a>
      <a class="nav-link d-inline" href="#">About</a>
    </div>
  </nav>

  <!-- Page -->
  <div class="form-container">

    <h4><strong>Verify OTP</strong></h4>

    <p class="subtitle">
      We've sent an email with an activation<br>
      code to your phone <strong>test@gmail.com</strong>
    </p>

    <form method="POST" action="{% url 'verify_otp' %}">
      {% csrf_token %}

      <!-- OTP Boxes -->
      <div class="otp-inputs">
        <input type="text" maxlength="1" name="otp_1" id="otp1" inputmode="numeric" autofocus>
        <input type="text" maxlength="1" name="otp_2" id="otp2" inputmode="numeric">
        <input type="text" maxlength="1" name="otp_3" id="otp3" inputmode="numeric">
        <input type="text" maxlength="1" name="otp_4" id="otp4" inputmode="numeric">
        <input type="text" maxlength="1" name="otp_5" id="otp5" inputmode="numeric">
        <input type="text" maxlength="1" name="otp_6" id="otp6" inputmode="numeric">
      </div>

      <!-- Timer -->
      <p class="resend-timer">Send code again &nbsp;<span id="timer">00:59</span></p>

      <!-- Resend -->
      <p class="resend-line">I didn't receive a code <a href="{% url 'resend_otp' %}">Resend</a></p>

      <!-- Verify Button -->
      <button type="submit" class="btn btn-primary">Verify</button>

    </form>
  </div>

  <script>
    // Auto-advance OTP inputs
    const otpInputs = document.querySelectorAll('.otp-inputs input');
    otpInputs.forEach((input, i) => {
      input.addEventListener('input', () => {
        input.value = input.value.replace(/\D/g, ''); // numbers only
        if (input.value.length === 1) {
          input.classList.add('filled');
          if (i < otpInputs.length - 1) otpInputs[i + 1].focus();
        }
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace') {
          input.classList.remove('filled');
          if (!input.value && i > 0) otpInputs[i - 1].focus();
        }
      });
    });

    // Countdown timer
    let seconds = 59;
    const timerEl = document.getElementById('timer');
    const interval = setInterval(() => {
      seconds--;
      timerEl.textContent = '00:' + String(seconds).padStart(2, '0');
      if (seconds <= 0) clearInterval(interval);
    }, 1000);
  </script>

</body>

</html>
