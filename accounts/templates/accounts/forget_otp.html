{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>SoleVault - Forgot Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'accounts/css/forgot_password.css' %}">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-custom px-4">
    <a class="navbar-brand" href="#">SoleVault</a>
    <div class="ms-3">
      <a class="nav-link d-inline" href="#">Home</a>
      <a class="nav-link d-inline" href="#">About</a>
    </div>
  </nav>

  <!-- Page -->
  <div class="page-wrapper">
    <div class="card-box">

      <h5 class="page-title">Forgot Password ?</h5>

      <form method="POST">
        {% csrf_token %}

        <label class="field-label">Enter your registered email</label>
        <input type="email" name="email" class="field-input" placeholder="helloworld@gmail.com">

        <button type="submit" class="btn-verify">Verify Email</button>

      </form>
    </div>
  </div>

</body>
</html>
