{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>SoleVault - Sign Up</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #ffffff;
    }

    .navbar-custom {
      background-color: #0D59F2;
    }

    .navbar-brand {
      font-weight: bold;
      color: white !important;
    }

    .nav-link {
      color: white !important;
    }

    .form-container {
      max-width: 400px;
      margin: 150px auto;
      text-align: center;
    }

    .form-control {
      margin-bottom: 15px;
    }

    .btn-primary {
      width: 100%;
      border-radius: 6px;
    }

    .divider {
      margin: 20px 0;
      display: flex;
      align-items: center;
      text-align: center;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      border-bottom: 1px solid #ccc;
    }

    .divider:not(:empty)::before {
      margin-right: .75em;
    }

    .divider:not(:empty)::after {
      margin-left: .75em;
    }

    .google-btn {
      width: 100%;
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 6px;
      background: white;
    }

    .small-text {
      font-size: 12px;
      color: #555;
    }

    label {
      display: block;
      text-align: left;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-custom px-5">
    <a class="navbar-brand" href="#">SoleVault</a>

    <div class="ms-4">
      <a class="nav-link d-inline" href="#">Home</a>
      <a class="nav-link d-inline" href="#">About</a>
    </div>
  </nav>

  <!-- Form -->
  <div class="form-container">

    <h4 class="mb-4"><strong>Login</strong></h4>

    <form method="POST">
      {% csrf_token %}
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" required>
      <label for="">Password</label>
      <div class="position-relative">
        <input type="password" name="password" class="form-control" required>
      </div>


      <p class="small-text">
        New User
        <a href="{% url 'signup' %}">Sign Up</a>
      </p>

      <button type="submit" class="btn btn-primary">Login</button>

      <div class="divider">Or Login with</div>

      <button type="button" class="google-btn">
        <img src="https://img.icons8.com/color/16/google-logo.png">
        Google
      </button>

    </form>
  </div>

</body>

</html>
