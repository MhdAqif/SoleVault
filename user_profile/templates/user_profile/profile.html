{% extends 'user_profile/base_profile.html' %}
{% load static %}

{% block title %}My Profile - SoleVault{% endblock %}

{% block active_profile %}active{% endblock %}

{% block profile_content %}

<div class="profile-card">
  <h4>Welcome {{ user.get_full_name }} !</h4>

  <form method="POST" action="{% url 'user_profile:profile' %}">
    {% csrf_token %}

    <div class="profile-field">
      <label>Full name</label>
      <input type="text" name="full_name" value="{{ user.get_full_name }}" placeholder="Aqif A">
    </div>

    <div class="profile-field">
      <label>Email</label>
      <input type="email" name="email" value="{{ user.email }}" placeholder="example@gmail.com" readonly>
    </div>

    <div class="profile-field">
      <label>Phone</label>
      <input type="tel" name="phone" value="{{ profile.phone|default:'' }}" placeholder="+91 000-000-0000">
    </div>

  <div class="center-btn">
  <a href="{% url 'user_profile:profile_edit' %}" class="btn-edit">EDIT</a>
</div>

  </form>
</div>

{% endblock %}
